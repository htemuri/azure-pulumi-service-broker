syntax = "proto3";

package proto.templates;

import "proto/templates/base.proto";
import "proto/templates/security.proto";
import "proto/templates/storage.proto";

option go_package = "github.com/htemuri/azure-pulumi-service-broker/pkg/templates";

message Templates {
  oneof template {
    templates.Base base = 1;
    templates.Security security = 2;
    templates.Storage storage = 3;
  }
}

// message TemplatesRequest {
//   oneof request {
//     templates.BaseRequest base = 1;
//     // templates.SecurityRequest security = 2;
//     // templates.StorageRequest storage = 3;
//   }
// }

message TemplatesResponse {
  Status status = 1;
  string error = 2;
  oneof response {
    templates.BaseResponse base = 3;
    templates.SecurityResponse security = 4;
    templates.StorageResponse storage = 5;
  }
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_SUCCESS = 1;
  STATUS_ERROR = 2;
}

enum TemplateOptions {
  TEMPLATE_OPTIONS_UNSPECIFIED = 0;
  TEMPLATE_OPTIONS_BASE = 1;
  TEMPLATE_OPTIONS_SECURITY = 2;
  TEMPLATE_OPTIONS_STORAGE = 3;
}
