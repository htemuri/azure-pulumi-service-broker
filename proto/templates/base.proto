syntax = "proto3";

package proto.templates;

import "proto/templates/shared.proto";

option go_package = "pkg/templates";

message Base {
  DefaultParams default_params = 1;
  SubscriptionArgs subscription = 2;
  NetworkArgs virtual_network = 3;
}

message SubscriptionArgs {
  optional string subscription_id = 1; // if not set, create a subscription using the env and project name in the format of "[{Environment}] Client Project: {ProjectName}"
  string billing_scope = 2;
  string management_group_id = 3;
}

message NetworkArgs {
  IpamPoolPrefixAllocation ipam_pool_prefix_allocations = 1; // required (will error if not set)
  repeated SubnetArgs subnets = 2;
}

message SubnetArgs {
  string name = 1;
  int32 number_of_ip_addresses = 2;
}

message IpamPoolPrefixAllocation {
  string ipam_pool_resource_id = 1;
  int32 number_of_ip_addresses = 2;
}
