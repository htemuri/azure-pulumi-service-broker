syntax = "proto3";

package proto.templates;

import "proto/templates/shared.proto";

option go_package = "pkg/templates";

message Base {
  DefaultParams default_params = 1;
  optional string subscription_id = 2; // if not set, create a subscription using the env and project name in the format of "[{Environment}] Client Project: {ProjectName}"
  optional string resource_group = 3; // if not set, create a resource group with name "network_rg"
  NetworkArgs virtual_network = 4;
}

message NetworkArgs {
  optional string virtual_network_resource_id = 1; // if not set, create a vnet
  IpamPoolPrefixAllocation ipam_pool_prefix_allocations = 2;
  repeated SubnetArgs subnets = 3;
}

message SubnetArgs {
  string name = 1;
  IpamPoolPrefixAllocation ipam_pool_prefix_allocations = 2;
}

message IpamPoolPrefixAllocation {
  string ipam_pool_resource_id = 1;
  string number_of_ip_addresses = 2;
}
