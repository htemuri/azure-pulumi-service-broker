syntax = "proto3";

package proto.templates;

import "proto/templates/shared.proto";

option go_package = "github.com/htemuri/azure-pulumi-service-broker/pkg/templates";

// Stack creating/selecting subscription and networking
message Base {
  string stack_name = 1;
  repeated ProviderVersion provider_versions = 2;
  repeated TemplateOptions depends_on = 3;
  BaseRequest request = 4;
  BaseResponse response = 5; // leave empty when making requests
}

message BaseRequest {
  DefaultParams default_params = 1;
  SubscriptionArgs subscription = 2;
  NetworkArgs virtual_network = 3;
}

message BaseResponse {
  string subscription_id = 1;
  string vnet_id = 2;
  repeated SubnetResponse subnets = 3;
}

message SubscriptionArgs {
  string subscription_id = 1; // if not set, create a subscription using the env and project name in the format of "[{Environment}] Client Project: {ProjectName}"
  string billing_scope = 2;
  string management_group_id = 3;
}

message NetworkArgs {
  IpamPoolPrefixAllocation ipam_pool_prefix_allocations = 1; // required (will error if not set)
  repeated SubnetArgs subnets = 2;
}

message SubnetArgs {
  string name = 1;
  int32 number_of_ip_addresses = 2;
}

message SubnetResponse {
  string name = 1;
  string id = 2;
  int32 ips_left = 3; // number of IP addresses left to consume
}

message IpamPoolPrefixAllocation {
  string ipam_pool_resource_id = 1;
  int32 number_of_ip_addresses = 2;
}
