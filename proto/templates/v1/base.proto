syntax = "proto3";

package templates.v1;

import "templates/v1/shared.proto";

option go_package = "github.com/htemuri/azure-pulumi-service-broker/pkg/templates";

// Stack creating/selecting subscription and networking
message BaseTemplateArgs {
  DefaultParamsArgs default_params_args = 1;
  SubscriptionArgs subscription_args = 2;
  NetworkArgs virtual_network_args = 3;
}

message SubscriptionArgs {
  string subscription_id = 1; // if not set, create a subscription using the env and project name in the format of "[{Environment}] Client Project: {ProjectName}"
  string billing_scope = 2;
  string management_group_id = 3;
}

message NetworkArgs {
  IpamPoolPrefixAllocationArgs ipam_pool_prefix_allocations_args = 1; // required (will error if not set)
  repeated SubnetArgs subnet_args = 2;
}

message SubnetArgs {
  string name = 1;
  int32 number_of_ip_addresses = 2;
}

message IpamPoolPrefixAllocationArgs {
  string ipam_pool_resource_id = 1;
  int32 number_of_ip_addresses = 2;
}
