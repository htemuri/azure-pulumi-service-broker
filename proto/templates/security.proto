syntax = "proto3";

package proto.templates;

import "proto/templates/shared.proto";

option go_package = "github.com/htemuri/azure-pulumi-service-broker/pkg/templates";

// stack for akvs and other resource types that are security related ...
message Security {
  SecurityRequest request = 1;
  SecurityResponse response = 2;
}

message SecurityRequest {
  DefaultParams default_params = 1;
  KeyVaultArgs key_vault = 2;
}

message SecurityResponse {
  string key_vault_id = 1;
  string key_vault_urn = 2;
}

message KeyVaultArgs {
  bool disabled = 1; // enabled by default
  ResourceNetworkArgs network_settings = 2;
}

// can add whatever other resources below
