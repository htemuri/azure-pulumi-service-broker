syntax = "proto3";

package proto.templates;

import "proto/templates/shared.proto";

option go_package = "github.com/htemuri/azure-pulumi-service-broker/pkg/templates";

// stack for akvs and other resource types that are security related ...
message Security {
  string stack_name = 1;
  repeated ProviderVersion provider_versions = 2;
  repeated TemplateOptions depends_on = 3;
  SecurityRequest request = 4;
  SecurityResponse response = 5;
}

message SecurityRequest {
  DefaultParams default_params = 1;
  KeyVaultArgs key_vault = 2;
}

message SecurityResponse {
  string resource_group_name = 1;
  string resource_group_id = 2;
  string key_vault_id = 3;
  string key_vault_uri = 4;
  repeated PrivateEndpointResponse private_endpoints = 5;
}

message KeyVaultArgs {
  bool disabled = 1; // enabled by default
  ResourceNetworkArgs network_settings = 2; // default public network disabled with no private endpoints
}

// can add whatever other resources below
